<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - Gobang</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            margin-bottom: 20px;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            align-items: center;
        }

        .current-player {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
        }

        .player-piece {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .player-piece.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .player-piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
        }

        .btn {
            padding: 10px 25px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #e94560;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        .btn:hover {
            background: #ff6b6b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
        }

        #gameCanvas {
            background: #deb887;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .winner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 100;
        }

        .winner-overlay.show {
            display: flex;
        }

        .winner-text {
            font-size: 3rem;
            color: #ffd700;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .instructions {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎮 五子棋</h1>
    
    <div class="game-info">
        <div class="current-player">
            <div class="player-piece black" id="currentPiece"></div>
            <span id="currentPlayerText">当前：黑方</span>
        </div>
        <button class="btn" onclick="resetGame()">重新开始</button>
    </div>
    
    <canvas id="gameCanvas" width="540" height="540"></canvas>
    
    <p class="instructions">点击棋盘落子 · 率先连成五子获胜</p>
    
    <div class="winner-overlay" id="winnerOverlay">
        <div class="winner-text" id="winnerText">黑方获胜！</div>
        <button class="btn" onclick="resetGame()">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 游戏配置
        const BOARD_SIZE = 15;
        const CELL_SIZE = 36;
        const PADDING = 18;
        
        // 游戏状态
        let board = [];
        let currentPlayer = 'black'; // 'black' or 'white'
        let gameOver = false;
        let lastMove = null; // 记录最后一步，用于高亮
        
        // 初始化棋盘
        function initBoard() {
            board = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = null;
                }
            }
        }
        
        // 绘制棋盘
        function drawBoard() {
            // 背景
            ctx.fillStyle = '#deb887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#8b4513';
            ctx.lineWidth = 1;
            
            // 绘制网格线
            for (let i = 0; i < BOARD_SIZE; i++) {
                // 横线
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, PADDING + i * CELL_SIZE);
                ctx.stroke();
                
                // 竖线
                ctx.beginPath();
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }
            
            // 绘制天元和星位
            const starPoints = [
                [3, 3], [3, 7], [3, 11],
                [7, 3], [7, 7], [7, 11],
                [11, 3], [11, 7], [11, 11]
            ];
            
            ctx.fillStyle = '#000';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(
                    PADDING + x * CELL_SIZE,
                    PADDING + y * CELL_SIZE,
                    4, 0, Math.PI * 2
                );
                ctx.fill();
            });
        }
        
        // 绘制棋子
        function drawPiece(row, col, color) {
            const x = PADDING + col * CELL_SIZE;
            const y = PADDING + row * CELL_SIZE;
            
            // 棋子阴影
            ctx.beginPath();
            ctx.arc(x + 2, y + 2, 14, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fill();
            
            // 棋子主体
            const gradient = ctx.createRadialGradient(x - 4, y - 4, 0, x, y, 14);
            if (color === 'black') {
                gradient.addColorStop(0, '#555');
                gradient.addColorStop(1, '#000');
            } else {
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ddd');
            }
            
            ctx.beginPath();
            ctx.arc(x, y, 14, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 棋子光泽
            ctx.beginPath();
            ctx.arc(x - 4, y - 4, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fill();
        }
        
        // 高亮最后一步
        function drawLastMove() {
            if (!lastMove) return;
            
            const { row, col } = lastMove;
            const x = PADDING + col * CELL_SIZE;
            const y = PADDING + row * CELL_SIZE;
            
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x, y, 16, 0, Math.PI * 2);
            ctx.stroke();
        }
        
        // 重新绘制整个棋盘
        function redraw() {
            drawBoard();
            
            // 绘制所有棋子
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j]) {
                        drawPiece(i, j, board[i][j]);
                    }
                }
            }
            
            drawLastMove();
        }
        
        // 检查胜负
        function checkWinner(row, col, color) {
            const directions = [
                [0, 1],   // 水平
                [1, 0],   // 垂直
                [1, 1],   // 对角线 \
                [1, -1]   // 对角线 /
            ];
            
            for (const [dx, dy] of directions) {
                let count = 1;
                
                // 正方向
                let r = row + dx;
                let c = col + dy;
                while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === color) {
                    count++;
                    r += dx;
                    c += dy;
                }
                
                // 反方向
                r = row - dx;
                c = col - dy;
                while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === color) {
                    count++;
                    r -= dx;
                    c -= dy;
                }
                
                if (count >= 5) return true;
            }
            
            return false;
        }
        
        // 检查棋盘是否已满
        function isBoardFull() {
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (!board[i][j]) return false;
                }
            }
            return true;
        }
        
        // 点击处理
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // 计算最近的交叉点
            const col = Math.round((x - PADDING) / CELL_SIZE);
            const row = Math.round((y - PADDING) / CELL_SIZE);
            
            // 检查是否在棋盘范围内且该位置为空
            if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE && !board[row][col]) {
                // 落子
                board[row][col] = currentPlayer;
                lastMove = { row, col };
                
                // 检查是否获胜
                if (checkWinner(row, col, currentPlayer)) {
                    gameOver = true;
                    showWinner(currentPlayer);
                } else if (isBoardFull()) {
                    gameOver = true;
                    showDraw();
                } else {
                    // 切换玩家
                    currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
                    updatePlayerDisplay();
                }
                
                redraw();
            }
        });
        
        // 更新玩家显示
        function updatePlayerDisplay() {
            const pieceEl = document.getElementById('currentPiece');
            const textEl = document.getElementById('currentPlayerText');
            
            pieceEl.className = 'player-piece ' + currentPlayer;
            textEl.textContent = currentPlayer === 'black' ? '当前：黑方' : '当前：白方';
        }
        
        // 显示获胜者
        function showWinner(color) {
            const overlay = document.getElementById('winnerOverlay');
            const text = document.getElementById('winnerText');
            
            text.textContent = (color === 'black' ? '黑方' : '白方') + '获胜！🎉';
            text.style.color = color === 'black' ? '#000' : '#fff';
            text.style.textShadow = color === 'black' 
                ? '0 0 30px rgba(255, 255, 255, 0.8)' 
                : '0 0 30px rgba(0, 0, 0, 0.8)';
            
            overlay.classList.add('show');
        }
        
        // 显示平局
        function showDraw() {
            const overlay = document.getElementById('winnerOverlay');
            const text = document.getElementById('winnerText');
            
            text.textContent = '平局！🤝';
            text.style.color = '#ffd700';
            
            overlay.classList.add('show');
        }
        
        // 重置游戏
        function resetGame() {
            initBoard();
            currentPlayer = 'black';
            gameOver = false;
            lastMove = null;
            
            document.getElementById('winnerOverlay').classList.remove('show');
            updatePlayerDisplay();
            redraw();
        }
        
        // 初始化
        resetGame();
    </script>
</body>
</html>
