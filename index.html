<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eleve Chat</title>
  <link rel="stylesheet" href="/src/style.css" />
  <style>
    /* 启动画面——Vite 编译完成前显示，React 挂载后淡出 */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      z-index: 99999;
      transition: opacity 0.4s ease;
    }
    #splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #splash img {
      width: 96px;
      height: 96px;
      animation: splash-breathe 2s ease-in-out infinite;
    }
    @keyframes splash-breathe {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <!-- 启动画面：放在 #root 外，React 不会清掉 -->
  <div id="splash">
    <img src="/eleve_logo.png" alt="Eleve" />
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
